name: CI — Lint & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Определяем, какие сервисы изменились
  # ─────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend:      ${{ steps.filter.outputs.frontend }}
      java-backend:  ${{ steps.filter.outputs.java-backend }}
      auth-service:  ${{ steps.filter.outputs.auth-service }}
      go-backend:    ${{ steps.filter.outputs.go-backend }}
      ml-service:    ${{ steps.filter.outputs.ml-service }}
      caddy:         ${{ steps.filter.outputs.caddy }}
      infra:         ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'services/vite-project/**'
            java-backend:
              - 'services/ai-agent-service/**'
            auth-service:
              - 'services/auth-service/**'
            go-backend:
              - 'services/go-backend/**'
            ml-service:
              - 'services/ml-ai-service/**'
            caddy:
              - 'services/caddy/**'
            infra:
              - 'docker-compose.yml'
              - '.env_example'
              - 'scripts/**'

  # ─────────────────────────────────────────────
  # Lint infrastructure files
  # ─────────────────────────────────────────────
  lint-infra:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true' || needs.detect-changes.outputs.caddy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

  # ─────────────────────────────────────────────
  # Frontend (Vite + Node)
  # ─────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: services/vite-project
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/vite-project/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npx vite build

      - name: Docker build check
        run: docker build -t ci-frontend-check .

  # ─────────────────────────────────────────────
  # Java Backend (ai-agent-service)
  # ─────────────────────────────────────────────
  build-java-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.java-backend == 'true'
    defaults:
      run:
        working-directory: services/ai-agent-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: >
          mvn package -B -DskipTests
          -Dprop.skipLoadProperties=true
          -DDB_HOST=localhost
          -DDB_USERNAME=test
          -DDB_PASSWORD=test
          -DDB_NAME=testdb

      - name: Docker build check
        run: >
          docker build
          --build-arg DB_HOST=localhost
          --build-arg DB_USERNAME=test
          --build-arg DB_PASSWORD=test
          --build-arg DB_NAME=testdb
          -t ci-java-check .

  # ─────────────────────────────────────────────
  # Auth Service (Java / Spring)
  # ─────────────────────────────────────────────
  build-auth-service:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-service == 'true'
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: >
          mvn package -B -DskipTests
          -Dprop.skipLoadProperties=true
          -DDB_HOST=localhost
          -DDB_USERNAME=test
          -DDB_PASSWORD=test
          -DDB_NAME=testdb

      - name: Docker build check
        run: >
          docker build
          --build-arg DB_HOST=localhost
          --build-arg DB_USERNAME=test
          --build-arg DB_PASSWORD=test
          --build-arg DB_NAME=testdb
          -t ci-auth-check .

  # ─────────────────────────────────────────────
  # Go Backend
  # ─────────────────────────────────────────────
  build-go-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.go-backend == 'true'
    defaults:
      run:
        working-directory: services/go-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/go-backend/go.mod
          cache-dependency-path: services/go-backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -o /dev/null ./cmd

      - name: Vet
        run: go vet ./...

      - name: Docker build check
        run: docker build -t ci-go-check .

  # ─────────────────────────────────────────────
  # ML / AI Service (Python)
  # ─────────────────────────────────────────────
  build-ml-service:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ml-service == 'true'
    defaults:
      run:
        working-directory: services/ml-ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ml-ai-service/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Docker build check
        run: docker build -t ci-ml-check .

  # ─────────────────────────────────────────────
  # Caddy
  # ─────────────────────────────────────────────
  build-caddy:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.caddy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Validate Caddyfile syntax
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.10-alpine \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1 || true
          # Note: validation may warn about rate_limit (custom plugin),
          # but syntax errors will still be caught

      - name: Docker build check
        run: docker build -t ci-caddy-check ./services/caddy

  # ─────────────────────────────────────────────
  # CI Gate — все обязательные проверки пройдены
  # ─────────────────────────────────────────────
  ci-passed:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lint-infra
      - build-frontend
      - build-java-backend
      - build-auth-service
      - build-go-backend
      - build-ml-service
      - build-caddy
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "=== CI Summary ==="
          echo "lint-infra:       ${{ needs.lint-infra.result }}"
          echo "build-frontend:   ${{ needs.build-frontend.result }}"
          echo "build-java:       ${{ needs.build-java-backend.result }}"
          echo "build-auth:       ${{ needs.build-auth-service.result }}"
          echo "build-go:         ${{ needs.build-go-backend.result }}"
          echo "build-ml:         ${{ needs.build-ml-service.result }}"
          echo "build-caddy:      ${{ needs.build-caddy.result }}"

          # Fail if any required job failed (skipped is OK)
          RESULTS=(
            "${{ needs.lint-infra.result }}"
            "${{ needs.build-frontend.result }}"
            "${{ needs.build-java-backend.result }}"
            "${{ needs.build-auth-service.result }}"
            "${{ needs.build-go-backend.result }}"
            "${{ needs.build-ml-service.result }}"
            "${{ needs.build-caddy.result }}"
          )

          for result in "${RESULTS[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ CI failed! At least one job did not pass."
              exit 1
            fi
          done

          echo "✅ All CI checks passed (or were skipped for unchanged services)"
